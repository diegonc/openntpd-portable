# GitHub Actions workflow to run tests on Linux.
name: "Linux"

on:
  push: {}
  pull_request: {}
  schedule:
    - cron: "0 0 * * *" # At 00:00 daily.

concurrency:
  group: "${{ github.workflow }}-${{ github.event.number || github.ref }}"
  cancel-in-progress: true

jobs:
  test:
    name: "${{ matrix.os }} (${{ matrix.compiler }})"
    runs-on: "${{ matrix.os }}"
    if: ${{ github.repository_owner == 'openntpd' || github.event_name != 'schedule' }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-22.04", "ubuntu-24.04"]
        compiler: ["gcc", "clang"]
    steps:
      - name: "Checkout repository"
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: "autogen"
        run: ./autogen.sh

      - name: "configure"
        run: ./configure
        env:
          CC: "${{ matrix.compiler }}"

      - name: "make"
        run: make

      - name: "make check"
        run: make check

      - name: "make distcheck"
        run: make distcheck
