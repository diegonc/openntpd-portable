# GitHub Actions workflow to run tests on Linux.
name: "Linux"

on:
  push: {}
  pull_request: {}
  schedule:
    - cron: "0 0 * * *" # At 00:00 daily.

concurrency:
  group: "${{ github.workflow }}-${{ github.event.number || github.ref }}"
  cancel-in-progress: true

jobs:
  test:
    name: "${{ matrix.os }} (${{ matrix.compiler }})${{ matrix.libtls && ' +libtls' || '' }}"
    runs-on: "${{ matrix.os }}"
    if: ${{ github.repository_owner == 'openntpd' || github.event_name != 'schedule' }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-22.04", "ubuntu-24.04"]
        compiler: ["gcc", "clang"]
        include:
          - os: "ubuntu-22.04"
            compiler: "gcc"
            libtls: true
          - os: "ubuntu-24.04"
            compiler: "gcc"
            libtls: true
    steps:
      - name: "Checkout repository"
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: "Install libtls-dev"
        if: matrix.libtls
        run: |
          sudo apt-get update
          sudo apt-get install -y libtls-dev

      - name: "autogen"
        run: ./autogen.sh

      - name: "configure"
        run: ./configure
        env:
          CC: "${{ matrix.compiler }}"

      - name: "make"
        run: make

      - name: "make check"
        run: make check

      - name: "make distcheck"
        run: make distcheck

  test-debian:
    name: "Debian Trixie (${{ matrix.compiler }})${{ matrix.libtls && ' +libtls' || '' }}"
    runs-on: ubuntu-24.04
    container: debian:trixie
    if: ${{ github.repository_owner == 'openntpd' || github.event_name != 'schedule' }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        compiler: ["gcc", "clang"]
        include:
          - compiler: "gcc"
            libtls: true
    steps:
      - name: "Install build dependencies"
        run: |
          apt-get update
          apt-get install -y git ${{ matrix.compiler }} make automake autoconf libtool bison \
            ${{ matrix.libtls && 'libtls-dev' || '' }}

      - name: "Checkout repository"
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: "autogen"
        run: ./autogen.sh

      - name: "configure"
        run: ./configure
        env:
          CC: "${{ matrix.compiler }}"

      - name: "make"
        run: make

      - name: "make check"
        run: make check

  test-out-of-tree:
    name: "Out-of-tree build (ubuntu-24.04)"
    runs-on: ubuntu-24.04
    if: ${{ github.repository_owner == 'openntpd' || github.event_name != 'schedule' }}
    permissions:
      contents: read
    steps:
      - name: "Checkout repository"
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: "autogen"
        run: ./autogen.sh

      - name: "configure (out of tree)"
        run: mkdir _build && cd _build && ../configure

      - name: "make"
        run: make -C _build

      - name: "make check"
        run: make -C _build check
